services:
  backend:
    build: ./backend
    environment:
      TRAFFIC_DATA_DIR: /app/data
      TRAFFIC_DETECTOR: auto
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    volumes:
      - traffic-data:/app/data
    ports: ["8000:8000"]
  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["8080:80"]
volumes:
  traffic-data:
